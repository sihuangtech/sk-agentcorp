services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./roles:/app/roles
      - ./templates:/app/templates
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile # Can be adjusted if frontend has its own
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  data:
